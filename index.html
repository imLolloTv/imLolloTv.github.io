<html>
    <head>
        <meta name="viewport" content="width=device-width, height=device-height, initial-scale=0.6">
        
        <title>ImLolloTv</title>

        <link rel="stylesheet" href="css/style.css">

        <link rel="shortcut icon" href="assets/favicon.ico" type="image/x-icon">

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Syne:wght@400..800&display=swap" rel="stylesheet">

    <body>
        <!-- <video src="assets/video/background.mp4" autoplay muted loop playsinline disablePictureInPicture loading="lazy"></video> -->
        <div id="liquidEther" style="position: absolute; width: 100%; height: 100%;"></div>

        <div class="sectionContainer">
            <section class="main">
                <main style="z-index: 1;">
                    <img class="logo" src="assets/img/logo.png" loading="lazy">
                    <img class="avatarDecoration" src="" loading="lazy">

                    <h1>Lollo</h1>
                    <h4>imlollotv</h1>
                    <div class="flagContainer"></div>

                    <button id="apriProfilo">
                        <i class="fa-brands fa-discord"></i>
                        Vedi su Discord
                    </button>

                    <div class="links"></div>

                    <div class="richPresenceContainer"></div>
                </main>

                <div class="nav navRight"></div>
            </section>
            <section class="tebex">
                <div class="nav navLeft"></div>
                
                <main style="z-index: 1; opacity: 1; margin: unset;">
                    <h2>Tebex Packages</h2>
                    <div class="packagesContainer">
                        <p>Le API non non hanno risposto 🥲</p>
                    </div>
                </main>

                <div class="nav navRight"></div>
            </section>
            <section class="projects">
                <div class="nav navLeft"></div>
                
                <main style="z-index: 1; opacity: 1; margin: unset;">
                    <h2>Repositories</h2>
                    <div class="repoContainer">
                        <p>Le API non non hanno risposto 🥲</p>
                    </div>
                </main>
            </section>
        </div>
        
        <main class="loading">
            Caricamento in corso...
        </main>
        
        <div class="alert">
            🚧 Work in progress 🚧
        </div>

        <a class="styled githubLink" href="https://github.com/imLolloTv/imLolloTv.github.io">
            <span>Source code</span>
            <i class="fa-brands fa-github"></i>
        </a>

        <!-- Hey, if you are using this code for yourself leaving this watermark would be appreciated 😉 -->
        <div class="watermark">
            <a href="https://imlollotv.github.io/">Made with ❤️ by ImLolloTv</a>
        </div>

        <div class="watermark" style="left: 20px;">
            <a href="https://imlollotv.github.io/claude/">🤖</a>
        </div>

        <!-- JavaScript -->

        <script type="module" src="https://cdnjs.cloudflare.com/ajax/libs/fetch/3.6.20/fetch.min.js" integrity="sha512-5vzl35V/cPSXliPbZtxHY0Q6cfYFd2Qld79+d7wLPbOxnKeCHH/LmlMD8aYl0ZN5VZPFM2FnKiAjoNJ2k3vrEg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.8.1/vanilla-tilt.min.js" integrity="sha512-wC/cunGGDjXSl9OHUH0RuqSyW4YNLlsPwhcLxwWW1CR4OeC2E1xpcdZz2DeQkEmums41laI+eGMw95IJ15SS3g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

        <script src="js/clickSpark.js"></script>

        <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
        <script src="js/liquidEther.js"></script>

        <script src="js/script.js"></script>
